# Material for MkDocs configuration
# Site: https://cazucito.github.io/thread-safe-collections/

site_name: Thread-Safe Collections
site_description: PoC educativa sobre colecciones seguras en ambientes multihilo con Java
site_author: cazucito
site_url: https://cazucito.github.io/thread-safe-collections/

# Repository information
repo_name: cazucito/thread-safe-collections
repo_url: https://github.com/cazucito/thread-safe-collections
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2026 cazucito - Licencia GPL v3.0

# Theme configuration
theme:
  name: material
  language: es
  custom_dir: docs/overrides
  
  # Palette (dark/light mode)
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  
  # Features
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
  
  # Icons and fonts
  icon:
    repo: fontawesome/brands/github
    logo: material/library
  
  font:
    text: Roboto
    code: Roboto Mono

# Plugins
plugins:
  - search:
      lang:
        - es
        - en
  - minify:
      minify_html: true
  - social:
      cards: true

# Markdown extensions
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3

# Extra CSS
extra_css:
  - assets/stylesheets/extra.css

# Extra JavaScript
extra_javascript:
  - assets/javascripts/extra.js

# Extra options
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cazucito
    - icon: fontawesome/brands/java
      link: https://openjdk.org/
  
  version:
    provider: mike
  
  consent:
    title: Cookie consent
    description: >
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.

# Navigation structure
nav:
  - Inicio: index.md
  - Guía Rápida:
    - guides/quickstart.md
    - guides/installation.md
    - guides/usage.md
  - Demos:
    - demos/index.md
    - demos/basic-collection.md
    - demos/copy-on-write.md
    - demos/concurrent-maps.md
    - demos/concurrent-sets.md
    - demos/queues.md
    - demos/counters.md
  - Guía de Decisión: guides/decision-guide.md
  - Benchmarks: benchmarks/index.md
  - Referencia:
    - guides/architecture.md
    - guides/api-reference.md
  - Contribuir: guides/contributing.md
